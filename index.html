<!DOCTYPE html>
<html>
<head>
  <title>Private Chat</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .chat-box{
      width:400px;
      height:600px;
      background:#1e293b;
      border-radius:20px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    .top{
      background:#2563eb;
      padding:15px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    #chat{
      flex:1;
      padding:15px;
      overflow-y:auto;
    }

    .msg{
      background:#334155;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
      width:fit-content;
      max-width:70%;
    }

    .you{
      background:#2563eb;
      margin-left:auto;
    }

    .bottom{
      display:flex;
      padding:10px;
      background:#0f172a;
    }

    #msg{
      flex:1;
      padding:10px;
      border:none;
      border-radius:10px;
      outline:none;
      font-size:16px;
    }

    button{
      margin-left:10px;
      padding:10px 15px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#1d4ed8;
    }

  </style>

</head>

<body>

<div class="chat-box">

  <div class="top">
    🔒 Private Chat
  </div>

  <div id="chat"></div>

  <div class="bottom">
    <input type="text" id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const password = prompt("Enter password");

socket.emit("login", password);

socket.on("message", (msg) => {

  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="msg">
      ${msg}
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;

});

function send(){

  const input = document.getElementById("msg");

  const msg = input.value;

  if(!msg) return;

  socket.emit("message", msg);

  document.getElementById("chat").innerHTML += `
    <div class="msg you">
      ${msg}
    </div>
  `;

  input.value = "";

  const chat = document.getElementById("chat");

  chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
