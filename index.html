<!DOCTYPE html>
<html>
<head>
  <title>Private Chat</title>

  <style>

    body{
      margin:0;
      background:#111827;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      width:350px;
      height:500px;
      background:#1f2937;
      border-radius:15px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .top{
      background:#2563eb;
      color:white;
      text-align:center;
      padding:15px;
      font-size:20px;
      font-weight:bold;
    }

    #chat{
      flex:1;
      padding:10px;
      overflow-y:auto;
      color:white;
    }

    .me{
      background:#2563eb;
      padding:8px;
      border-radius:10px;
      margin:5px;
      width:fit-content;
      margin-left:auto;
    }

    .other{
      background:#374151;
      padding:8px;
      border-radius:10px;
      margin:5px;
      width:fit-content;
    }

    .bottom{
      display:flex;
      padding:10px;
      background:#111827;
    }

    #msg{
      flex:1;
      padding:10px;
      border:none;
      border-radius:10px;
      outline:none;
    }

    button{
      margin-left:5px;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="box">

  <div class="top">
    🔒 Private Chat
  </div>

  <div id="chat"></div>

  <div class="bottom">
    <input id="msg" placeholder="Type message">
    <button onclick="send()">Send</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const password = prompt("Enter password");

socket.emit("login", password);

socket.on("message", (msg) => {

  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="other">${msg}</div>
  `;

  chat.scrollTop = chat.scrollHeight;

});

function send(){

  const input = document.getElementById("msg");

  const msg = input.value;

  if(msg.trim() === "") return;

  socket.emit("message", msg);

  const chat = document.getElementById("chat");

  chat.innerHTML += `
    <div class="me">${msg}</div>
  `;

  input.value = "";

  chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
